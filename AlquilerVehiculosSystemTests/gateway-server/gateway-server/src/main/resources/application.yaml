server:
  port: 8080

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: vehiculos-service
          uri: http://vehiculos-service:8081
          predicates:
            - Path=/api/vehiculos/**

        - id: operaciones-service
          uri: http://operaciones-service:8082
          predicates:
            - Path=/api/operaciones/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/