services:
  mysql:
    image: mysql:8.4
    container_name: mysql-vehiculos
    environment:
      MYSQL_DATABASE: vehiculosdb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  eureka-server:
    build:
      context: ./eureka-server/eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    restart: always

  gateway-server:
    build:
      context: ./gateway-server/gateway-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    restart: always

  vehiculos-service:
    build:
      context: ./vehiculos-service/vehiculos-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-server
    restart: always

  operaciones-service:
    build:
      context: ./operaciones-service/operaciones-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - vehiculos-service
    restart: always

volumes:
  mysql_data: